name: Release artifact

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Verify tag and package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          main_commit="$(git rev-parse "origin/main^{commit}")"
          if [[ "${tag_commit}" != "${main_commit}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} (${tag_commit}) is not the exact origin/main commit (${main_commit})" >&2
            exit 1
          fi
      - name: Test
        run: npm test
      - name: Build and verify package
        run: npm run verify:package
      - name: Create checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum gptandme.zip > gptandme.zip.sha256
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: dist/gptandme.zip
      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gptandme-${{ github.ref_name }}-${{ github.sha }}
          path: |
            dist/gptandme.zip
            dist/gptandme.zip.sha256
          if-no-files-found: error
          retention-days: 90
      - name: Publish durable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          zip_sha="$(awk '{print $1}' dist/gptandme.zip.sha256)"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)"
            if [[ "${is_draft}" == "true" ]]; then
              gh release delete "${GITHUB_REF_NAME}" --yes
            else
              existing_dir="$(mktemp -d)"
              gh release download "${GITHUB_REF_NAME}" \
                --pattern 'gptandme.zip' \
                --pattern 'gptandme.zip.sha256' \
                --dir "${existing_dir}"
              cmp --silent dist/gptandme.zip "${existing_dir}/gptandme.zip"
              cmp --silent dist/gptandme.zip.sha256 "${existing_dir}/gptandme.zip.sha256"
              echo "Published release assets already match this build; leaving them unchanged."
              exit 0
            fi
          fi
          gh release create "${GITHUB_REF_NAME}" \
            dist/gptandme.zip \
            dist/gptandme.zip.sha256 \
            --draft \
            --verify-tag \
            --generate-notes \
            --notes "Artifact SHA-256: ${zip_sha}" \
            --title "GPTandME ${GITHUB_REF_NAME#v}"
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
