<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Query Counter</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 14px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; justify-content: space-between; margin: 8px 0; }
      button { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; }
      button:hover { background: #eee; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .muted { color: #666; font-size: 12px; margin-top: 10px; }
      .chart-wrap { margin: 10px 0 4px; }
      .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
      .chart-header span { font-size: 12px; color: #666; }
      .chart-toggle { display: flex; gap: 4px; }
      .chart-toggle button { padding: 2px 8px; font-size: 11px; border-radius: 6px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; }
      .chart-toggle button.active { background: #222; color: #fff; border-color: #222; }
      #sparkline { display: block; width: 100%; height: 48px; }
    </style>
  </head>
  <body>
    <h1><a href="https://gptandme.site" target="_blank" rel="noopener noreferrer">GPTandme.site</a></h1>
    <div class="row"><div>Today</div><div id="today">0</div></div>
    <div class="row"><div>This week</div><div id="week">0</div></div>
    <div class="row"><div>This month</div><div id="month">0</div></div>
    <div class="row"><div>Total</div><div id="total">0</div></div>
    <div class="row"><div>Streak</div><div id="streak">0 days</div></div>
    <div class="chart-wrap">
      <div class="chart-header">
        <span>Usage</span>
        <div class="chart-toggle">
          <button id="btn7d" class="active">7d</button>
          <button id="btn30d">30d</button>
        </div>
      </div>
      <canvas id="sparkline"></canvas>
    </div>
    <div class="row">
      <button id="resetToday">Reset today</button>
      <button id="resetAll">Reset all</button>
    </div>
    <div class="row">
      <button id="downloadCsv">Download CSV</button>
    </div>
    <div class="muted">Counts are stored locally. Only user sends are counted.
      <br><a href="https://gptandme.site/privacy" target="_blank" rel="noopener noreferrer">Privacy policy</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
