<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Query Counter</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 14px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; justify-content: space-between; margin: 8px 0; }
      button { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; }
      button:hover { background: #eee; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .muted { color: #666; font-size: 12px; margin-top: 10px; }
      .section-title { font-size: 12px; color: #666; margin: 12px 0 4px; font-weight: 600; }
      .value { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <h1><a href="https://gptandme.site" target="_blank" rel="noopener noreferrer">GPTandme.site</a></h1>
    <div class="row"><div>Today</div><div id="today" class="value">0</div></div>
    <div class="row"><div>This week</div><div id="week" class="value">0</div></div>
    <div class="row"><div>This month</div><div id="month" class="value">0</div></div>
    <div class="row"><div>Streak</div><div id="streak" class="value">0 days</div></div>
    <div class="row"><div>Total</div><div id="total" class="value">0</div></div>
    <div class="row"><div>Est. today</div><div id="cost" class="value">$0.000</div></div>
    <div class="row"><div>Sessions</div><div id="sessions" class="value">0</div></div>
    <div id="modelSection" style="display:none;">
      <div class="section-title">Models (today)</div>
      <div id="modelBreakdown"></div>
    </div>
    <div class="row">
      <button id="downloadCsv">Download CSV</button>
    </div>
    <div class="row">
      <button id="resetToday">Reset today</button>
      <button id="resetAll">Reset all</button>
    </div>
    <div class="muted">Counts are stored locally. Only user sends are counted.</div>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
